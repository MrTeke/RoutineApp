<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumi — Redirecting...</title>
  <style>
    body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
    p { color: #fff; font-family: sans-serif; font-size: 16px; }
  </style>
</head>
<body>
  <p>Opening Lumi...</p>
  <script>
    var hash = window.location.hash.substring(1);
    var params = {};
    hash.split('&').forEach(function(pair) {
      var parts = pair.split('=');
      if (parts[0]) params[parts[0]] = decodeURIComponent(parts[1] || '');
    });

    var query = '';
    if (params.access_token) {
      query = '?access_token=' + encodeURIComponent(params.access_token)
            + '&refresh_token=' + encodeURIComponent(params.refresh_token || '')
            + '&type=' + encodeURIComponent(params.type || '');
    } else if (params.error) {
      query = '?error=' + encodeURIComponent(params.error)
            + '&error_description=' + encodeURIComponent(params.error_description || '');
    }

    window.location.replace('lumi://reset-password' + query);
  </script>
</body>
</html>
