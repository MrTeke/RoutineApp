<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumi — Redirecting...</title>
  <style>
    body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
    p { color: #fff; font-family: sans-serif; font-size: 16px; }
  </style>
</head>
<body>
  <p>Opening Lumi...</p>
  <script>
    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var accessToken = params.get('access_token');
    var refreshToken = params.get('refresh_token') || '';
    var type = params.get('type') || '';
    var error = params.get('error') || '';

    var query;
    if (accessToken) {
      query = '?access_token=' + encodeURIComponent(accessToken)
            + '&refresh_token=' + encodeURIComponent(refreshToken)
            + '&type=' + encodeURIComponent(type);
    } else if (error) {
      query = '?error=' + encodeURIComponent(error);
    } else {
      query = '';
    }

    window.location.replace('lumi://reset-password' + query);
  </script>
</body>
</html>
